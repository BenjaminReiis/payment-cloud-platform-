version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: cloudpay_db
    restart: always
    environment:
      POSTGRES_DB: cloudpay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: cloudpay_backend
    restart: always
    depends_on:
      - db
    environment:
      PORT: 3333
      DATABASE_URL: postgresql://postgres:postgres@db:5432/cloudpay?schema=public
      JWT_SECRET: supersecretjwt
    ports:
      - "3333:3333"

  frontend:
    build: ./frontend
    container_name: cloudpay_frontend
    restart: always
    depends_on:
      - backend
    environment:
      VITE_API_URL: [localhost](http://localhost:3333)
    ports:
      - "5173:5173"

volumes:
  postgres_data:
